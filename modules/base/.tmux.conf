# Pass focus events (FocusIn/FocusOut) through to applications inside panes.
# Required for Neovim's autoread to fire when switching back to the terminal.
set-option -g focus-events on

# Tell tmux that the outer terminal supports true 24-bit RGB color.
# Without this, termguicolors in Neovim doesn't work and colors look wrong.
# Assumes the terminal running tmux supports true color (VTE-based terminals do).
set -g default-terminal "tmux-256color"
set -ag terminal-features ",tmux-256color:RGB"

# Copy tmux's buffer to the system clipboard.
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -in'
# If you use tmux in vi mode, use copy-mode-vi. If you use emacs mode, use copy-mode.
set -g mode-keys vi
set -g status-keys vi
set -g status off

# Not a setting but just a reminder that prefix + ! will break a pane from the current window (i.e. a split) into its own window


######## Cheat Sheet ########
# - <leader> is currently set to <C-b>
# - most important keybindings starting with <leader> keypress
#       c         to create a new window
#       n/p       switches between next or previous windows
#       w         opens view of all windows
#       ,         renames current window
#       x         asks you if you want to kill the current pane and the processes in it
#       !         will create a new window from the current pane (i.e. break it out of the old window in split view) (don't think this is a custom remap but I am not sure about it)
#       - and |   (custom remap) create a new pane in a split view
#       r         (custom remap) reload tmux conf
#       hjkl      (custom remap) allows me to jump between panes in a window
#       C + hjkl  (custom remap) resize panels
#       < and >   (custom remap) change order of windows
#       u and U   (custom remap) select another window and join it as a pane with the current one either horizontally or vertically





#####################   Key bindings   #####################
# Reload the tmux config file using Prefix and then r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# more intuitive hotkeys for splitting a window (| and -)
bind | split-window -hc "#{pane_current_path}"
bind - split-window -vc "#{pane_current_path}"

# Swap windows around (< and >)
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# Resize panes using Ctrl + hjkl
bind -r C-j resize-pane -D 1
bind -r C-k resize-pane -U 1
bind -r C-h resize-pane -L 2
bind -r C-l resize-pane -R 2

# Choose a window then join horizontally or vertically
bind u choose-window 'join-pane -h -s "%%"'
bind U choose-window 'join-pane -s "%%"'

# Creating a new window keeps the current path
bind c new-window -c "#{pane_current_path}"

# When renaming windows don't show the old name
bind-key , command-prompt -p 'new-name:' 'rename-window "%%"'

# testing to move around tmux with <leader>hjkl
bind 'h' select-pane -L
bind 'j' select-pane -D
bind 'k' select-pane -U
bind 'l' select-pane -R

#####################   Key bindings end   #####################








# Activate the mouse in tmux
set -g mouse on

# Make indexing of windows start with 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Automatically renumber windows when one is deleted (instead of keeping the originally assigned numbers the whole time)
set -g renumber-windows on

# Name all new windows "temp" by default
set-hook -g after-new-window 'rename-window temp'








